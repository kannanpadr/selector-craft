  <line x1="64" y1="98" x2="64" y2="116" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <line x1="12" y1="64" x2="30" y2="64" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <line x1="98" y1="64" x2="116" y2="64" stroke="#8b5cf6" stroke-width="4" stroke-linecap="round"/>
  <!-- AI sparkle star in upper right -->
  <path d="M92,36 L94,42 L100,44 L94,46 L92,52 L90,46 L84,44 L90,42 Z" fill="#fb7185"/>
